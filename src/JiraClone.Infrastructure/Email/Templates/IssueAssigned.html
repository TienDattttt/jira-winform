<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{Title}}</title>
</head>
<body style="margin:0;padding:24px;background:#F4F5F7;font-family:Segoe UI,Arial,sans-serif;color:#172B4D;">
  <div style="max-width:640px;margin:0 auto;background:#FFFFFF;border:1px solid #DFE1E6;border-radius:12px;overflow:hidden;">
    <div style="background:#0052CC;padding:20px 24px;color:#FFFFFF;">
      <div style="font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.88;">Jira Desktop</div>
      <h1 style="margin:8px 0 0 0;font-size:24px;line-height:1.3;">You've been assigned {{IssueKey}}</h1>
    </div>
    <div style="padding:24px;">
      <p style="margin:0 0 14px 0;font-size:14px;color:#42526E;">Hello {{RecipientName}},</p>
      <p style="margin:0 0 16px 0;font-size:15px;line-height:1.6;">{{SummaryLine}}</p>
      <div style="padding:16px;border:1px solid #DFE1E6;border-radius:10px;background:#FAFBFC;">
        <div style="font-size:12px;color:#6B778C;text-transform:uppercase;letter-spacing:.05em;">Issue</div>
        <div style="margin-top:6px;font-size:18px;font-weight:600;">{{IssueKey}}</div>
        <div style="margin-top:6px;font-size:14px;color:#42526E;">{{IssueTitle}}</div>
        <div style="margin-top:12px;font-size:13px;color:#6B778C;">Project: {{ProjectName}}</div>
      </div>
      <p style="margin:20px 0 0 0;font-size:13px;color:#6B778C;">Open Jira Desktop to review and continue the work.</p>
    </div>
  </div>
</body>
</html>
