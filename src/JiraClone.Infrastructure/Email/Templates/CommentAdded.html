<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{Title}}</title>
</head>
<body style="margin:0;padding:24px;background:#F4F5F7;font-family:Segoe UI,Arial,sans-serif;color:#172B4D;">
  <div style="max-width:640px;margin:0 auto;background:#FFFFFF;border:1px solid #DFE1E6;border-radius:12px;overflow:hidden;">
    <div style="background:#0747A6;padding:20px 24px;color:#FFFFFF;">
      <div style="font-size:12px;letter-spacing:.08em;text-transform:uppercase;opacity:.88;">Jira Desktop</div>
      <h1 style="margin:8px 0 0 0;font-size:24px;line-height:1.3;">Comment activity on {{IssueKey}}</h1>
    </div>
    <div style="padding:24px;">
      <p style="margin:0 0 14px 0;font-size:14px;color:#42526E;">Hello {{RecipientName}},</p>
      <p style="margin:0 0 16px 0;font-size:15px;line-height:1.6;">{{SummaryLine}}</p>
      <div style="padding:16px;border-left:4px solid #2684FF;background:#F7F8F9;border-radius:8px;font-size:14px;line-height:1.6;color:#253858;">{{Body}}</div>
      <p style="margin:18px 0 0 0;font-size:13px;color:#6B778C;">Issue: <strong>{{IssueKey}}</strong> in {{ProjectName}}</p>
    </div>
  </div>
</body>
</html>
